services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pacademy-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PaAcademy_Dev#2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "PaAcademy_Dev#2026!",
          "-C",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/PACademy.Api/Dockerfile
    container_name: pacademy-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=PACademy;User Id=sa;Password=PaAcademy_Dev#2026!;TrustServerCertificate=True;"
      SeedDemo: "true"
      Logging__LogLevel__Microsoft.AspNetCore.Authentication: "Information"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
